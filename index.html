<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Walecard AI Assistant</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 500px;
      margin: auto;
      padding: 20px;
    }
    #chatbox {
      border: 1px solid #ccc;
      padding: 10px;
      height: 350px;
      overflow-y: auto;
      border-radius: 8px;
      background: #fafafa;
    }
    .msg {
      margin: 10px 0;
    }
    .you {
      font-weight: bold;
      color: #0066cc;
    }
    .ai {
      font-weight: bold;
      color: #009933;
    }
    #userInput {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }
    #sendBtn {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      background: #0066cc;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h2 style="text-align:center;">Walecard AI Assistant</h2>

  <div id="chatbox"></div>

  <input id="userInput" type="text" placeholder="Ask me for the best card...">
  <button id="sendBtn" onclick="sendMessage()">Send</button>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyfJjtS8W7HRYxsIsJXYj5J8VKk19QLl1t1RAuEcOMp0Ow46jE7bGShiT7Nl-BsySIW/exec";

    function addMessage(sender, text) {
      const chatbox = document.getElementById("chatbox");
      const msg = document.createElement("div");
      msg.classList.add("msg");
      msg.innerHTML = `<span class="${sender}">${sender === 'You' ? 'You' : 'AI'}:</span> ${text}`;
      chatbox.appendChild(msg);
      chatbox.scrollTop = chatbox.scrollHeight;
    }

    async function sendMessage() {
      const input = document.getElementById("userInput");
      const message = input.value.trim();
      if (!message) return;

      addMessage("You", message);
      input.value = "";

      addMessage("AI", "Thinking...");

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          body: JSON.stringify({ message: message }),
          headers: { "Content-Type": "application/json" }
        });

        const data = await response.json();

        // Remove "Thinking..."
        const chatbox = document.getElementById("chatbox");
        chatbox.removeChild(chatbox.lastChild);

        addMessage("AI", data.reply);

      } catch (error) {
        addMessage("AI", "Error: Could not reach the server.");
      }
    }
  </script>

</body>
</html>
